<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>666 PROTECTOR</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg"></div>
<div class="particles"></div>

<div class="hub">

    <div class="topGlow"></div>

    <div class="logoBox">
        <div class="logoCircle"></div>
        <h1>666 PROTECTOR</h1>
        <p>Protect your Lua scripts in style.</p>
    </div>

    <div class="section">
        <label>Script Name</label>
        <input maxlength="15" id="scriptName" placeholder="MyScript">
    </div>

    <div class="section">
        <label>Lua Script</label>

        <textarea
        id="scriptContent"
        placeholder="Escribe tu codigo Lua aqui!"
        ></textarea>
    </div>

    <div class="uploadBox">
        <input type="file" id="fileInput" accept=".txt">

        <label for="fileInput">
            <span>UPLOAD TXT FILE</span>
        </label>
    </div>

    <button id="createBtn">
        CREATE SCRIPT
    </button>

    <div id="result"></div>

</div>

<script src="script.js"></script>
</body>
</html>
