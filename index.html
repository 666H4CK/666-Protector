<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>666 PROTECTOR</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,Arial,sans-serif;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:#050505;
padding:25px;
color:white;
}

/* BACKGROUND */

.bg{
position:fixed;
inset:0;

background:
radial-gradient(circle at top,#3d0000 0%,#070707 45%),
radial-gradient(circle at bottom,#140000 0%,#000000 70%);

animation:bgMove 8s infinite alternate;
}

@keyframes bgMove{

from{
transform:scale(1);
}

to{
transform:scale(1.06);
}

}

/* HUB */

.hub{

position:relative;

width:820px;
max-width:100%;

padding:38px;

border-radius:38px;

background:
rgba(12,12,12,0.78);

backdrop-filter:blur(18px);

border:
1px solid rgba(255,0,0,0.12);

box-shadow:
0 0 60px rgba(255,0,0,0.15),
inset 0 0 25px rgba(255,0,0,0.04);

animation:intro 0.9s cubic-bezier(.17,.89,.32,1.28);

}

/* ENTRADA */

@keyframes intro{

from{
opacity:0;
transform:
translateY(80px)
scale(0.88);
}

to{
opacity:1;
transform:
translateY(0px)
scale(1);
}

}

/* GLOW */

.glow{

position:absolute;

width:280px;
height:280px;

background:red;

border-radius:50%;

filter:blur(150px);

opacity:0.18;

top:-120px;
left:50%;

transform:translateX(-50%);

pointer-events:none;

}

/* HEADER */

.header{
display:flex;
flex-direction:column;
align-items:center;
margin-bottom:30px;
}

.logo{

width:95px;
height:95px;

border-radius:28px;

background:
linear-gradient(145deg,#ff0000,#5c0000);

box-shadow:
0 0 40px rgba(255,0,0,0.45),
inset 0 0 15px rgba(255,255,255,0.08);

margin-bottom:22px;

animation:float 4s infinite ease-in-out;

}

@keyframes float{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-8px);
}

100%{
transform:translateY(0px);
}

}

h1{

font-size:48px;

font-weight:900;

letter-spacing:4px;

color:#ff2d2d;

text-shadow:
0 0 25px rgba(255,0,0,0.65);

}

.sub{

margin-top:10px;

color:#9a9a9a;

font-size:15px;

}

/* SECTIONS */

.section{
margin-bottom:22px;
}

.section label{

display:block;

margin-bottom:10px;

font-size:13px;

letter-spacing:1px;

color:#ff4b4b;

}

/* INPUTS */

.input,
.textarea{

width:100%;

background:
rgba(255,255,255,0.03);

border:
1px solid rgba(255,0,0,0.12);

outline:none;

color:white;

transition:0.25s;

}

.input{

height:58px;

padding:0 20px;

border-radius:18px;

font-size:15px;

}

.textarea{

height:260px;

padding:20px;

border-radius:24px;

resize:none;

font-size:14px;

line-height:1.5;

}

.input:focus,
.textarea:focus{

transform:translateY(-2px);

border-color:
rgba(255,0,0,0.35);

box-shadow:
0 0 30px rgba(255,0,0,0.12);

}

/* UPLOAD */

.upload{

height:64px;

border-radius:20px;

display:flex;

justify-content:center;
align-items:center;

background:
rgba(255,255,255,0.03);

border:
1px solid rgba(255,0,0,0.12);

cursor:pointer;

font-weight:700;

letter-spacing:1px;

transition:0.25s;

}

.upload:hover{

transform:translateY(-2px);

background:
rgba(255,0,0,0.05);

box-shadow:
0 0 25px rgba(255,0,0,0.12);

}

#fileInput{
display:none;
}

/* BUTTON */

button{

width:100%;

height:68px;

margin-top:8px;

border:none;

border-radius:22px;

background:
linear-gradient(145deg,#ff0000,#640000);

color:white;

font-size:16px;

font-weight:800;

letter-spacing:2px;

cursor:pointer;

transition:0.3s;

box-shadow:
0 0 35px rgba(255,0,0,0.22);

}

button:hover{

transform:
translateY(-3px)
scale(1.01);

box-shadow:
0 0 55px rgba(255,0,0,0.35);

}

/* RESULT */

#result{
margin-top:24px;
}

.result{

padding:22px;

border-radius:24px;

background:
rgba(255,255,255,0.03);

border:
1px solid rgba(255,0,0,0.12);

}

.result h3{

margin-bottom:14px;

color:#ff3a3a;

font-size:15px;

letter-spacing:1px;

}

.result textarea{

width:100%;

height:110px;

border:none;

outline:none;

resize:none;

padding:16px;

border-radius:18px;

background:#090909;

color:white;

font-size:13px;

}

</style>
</head>

<body>

<div class="bg"></div>

<div class="hub">

<div class="glow"></div>

<div class="header">

<div class="logo"></div>

<h1>666 PROTECTOR</h1>

<p class="sub">
Protect and host your Lua scripts.
</p>

</div>

<div class="section">

<label>Script Name</label>

<input
class="input"
maxlength="15"
id="scriptName"
placeholder="MyScript"
/>

</div>

<div class="section">

<label>Lua Script</label>

<textarea
class="textarea"
id="scriptContent"
placeholder="Escribe tu codigo Lua aqui!"
></textarea>

</div>

<div class="section">

<input
type="file"
id="fileInput"
accept=".txt"
/>

<label
for="fileInput"
class="upload"
>
UPLOAD TXT FILE
</label>

</div>

<button id="createBtn">
CREATE SCRIPT
</button>

<div id="result"></div>

</div>

<script>

const fileInput =
document.getElementById("fileInput");

const textarea =
document.getElementById("scriptContent");

const result =
document.getElementById("result");

fileInput.addEventListener(
"change",
async(e)=>{

const file =
e.target.files[0];

if(!file) return;

textarea.value =
await file.text();

});

document
.getElementById("createBtn")
.addEventListener(
"click",
()=>{

const name =
document
.getElementById("scriptName")
.value
.trim();

const raw =
`https://666-protector.com/api/loader?id=${name}`;

result.innerHTML = `

<div class="result">

<h3>LOADSTRING GENERATED</h3>

<textarea readonly>
loadstring(game:HttpGet("${raw}"))()
</textarea>

</div>

`;

});

</script>

</body>
</html>
